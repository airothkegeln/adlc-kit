# =============================================================================
# Agent Spec — Stack Contract Agent
# =============================================================================
# Corre despues de mapping y antes de spec_dev. Consolida los constraints
# duros de tecnologia en un CONTRATO inmutable que las fases siguientes
# (spec_dev, architecture, coding) NO pueden violar. Sin este contrato,
# spec_dev invento stack por cuenta propia (ej. Python/FastAPI) aun cuando
# el usuario declaro MACHBank o pidio explicitamente Node/Fastify/TS.
#
# Fuentes que mira para inferir el contrato (en orden de autoridad):
#   1. prompt_inicial — si el usuario escribio "stack obligatorio: X" o similar.
#   2. existing_docs / codebase_references — si el target_repo ya usa un stack.
#   3. Default MACHBank (Android Kotlin, iOS Swift) si el dominio es mobile.
#   4. Si hay ambiguedad genuina (ej. backend web sin stack declarado),
#      escribir source="inferred_ambiguous" y marcar ambiguous=true.
#      El gate downstream decide si pausar o pedir HITL.
# =============================================================================

agent: stack_contract
phase: stack_contract
tier: fast
description: >
  Consolida los constraints tecnologicos (lenguaje, framework, runtime,
  libs prohibidas/requeridas) en un contrato inmutable que las fases
  posteriores deben respetar. Evita que spec_dev/architecture inventen
  stack por default cuando el usuario no lo declaro explicito.

# -----------------------------------------------------------------------------
# Modelo — Haiku porque el razonamiento es estructural, no creativo
# -----------------------------------------------------------------------------
model: claude-haiku-4-5
max_tokens: 2048
temperature: 0.0

# -----------------------------------------------------------------------------
# Tools whitelist
# -----------------------------------------------------------------------------
# Stack Contract NO necesita tools — trabaja sobre lo que ya esta en el state.
# Si un humano quiere que lea un manifest del repo, usamos web_fetch (raro).
tools_whitelist:
  - web_fetch

# -----------------------------------------------------------------------------
# Capability matrix
# -----------------------------------------------------------------------------
capability_matrix:
  llm:
    - "deteccion de stack declarado explicito en el prompt"
    - "inferencia de stack desde codebase_references / existing_docs"
    - "evaluacion de ambiguedad (hay suficiente senal? o hay que pedir HITL?)"
  deterministic:
    - "lectura opcional de manifest (web_fetch)"

# -----------------------------------------------------------------------------
# Lectura/escritura del project_state
# -----------------------------------------------------------------------------
reads:
  - prompt_inicial
  - target_repo
  - reference_repos
  - existing_docs
  - codebase_references
  - gaps_identified
  - hypothesis
  - scope_boundaries
  - human_agent_map

writes:
  - stack_contract            # {language, framework, runtime, libs_required, libs_forbidden, source, ambiguous, justification}

# -----------------------------------------------------------------------------
# Guardrails
# -----------------------------------------------------------------------------
guardrails:
  max_iterations: 4
  required_outputs:
    - stack_contract
  forbidden_actions:
    - "proponer stack que contradiga lo declarado explicito en el prompt_inicial"
    - "marcar source=user_declared si el prompt no tiene declaracion textual"
    - "pisar un stack existente en el target_repo sin justificacion"
  validation:
    - rule: "stack_contract debe tener keys: language, framework, source, ambiguous"
    - rule: "source debe ser uno de: user_declared, repo_inferred, memory_default, inferred_ambiguous"
    - rule: "ambiguous debe ser bool"

# -----------------------------------------------------------------------------
# HITL
# -----------------------------------------------------------------------------
hitl:
  enabled: false              # El gate downstream decide si pausar

# -----------------------------------------------------------------------------
# Budget
# -----------------------------------------------------------------------------
budget:
  max_cost_usd: 0.30
  timeout_minutes: 3

# -----------------------------------------------------------------------------
# System prompt
# -----------------------------------------------------------------------------
system_prompt: |
  Eres el Stack Contract Agent del ciclo ADLC. Tu unico trabajo es consolidar
  los constraints tecnologicos (lenguaje, framework, runtime, libs requeridas
  o prohibidas) en un CONTRATO inmutable que las fases siguientes (spec_dev,
  architecture, coding) deben respetar.

  Este contrato existe porque sin el, spec_dev y architecture inventaron
  stack por cuenta propia (ej. eligieron Python/FastAPI cuando el usuario
  habia dicho Node/Fastify/TS, o eligieron un stack que contradecia el
  architecture_repo declarado). NUNCA mas.

  Fuentes en orden de autoridad (mas fuerte primero):

  1. reference_repos["arquitectura"]: el usuario declaro un repo de
     arquitectura como fuente de verdad. Discovery ya bajo su `stack.yaml`
     y lo puso en existing_docs. Leelo linea por linea y COPIA sus campos
     (frontend.language, backend.framework, forbidden, etc.) al
     stack_contract que emitas. source="architecture_repo",
     ambiguous=false. NO hagas inferencia si hay arquitectura declarada —
     es el contrato oficial, pisa todo lo demas EXCEPTO el punto 2.

  2. prompt_inicial: buscas declaraciones EXPLICITAS del usuario:
     - "stack obligatorio: X", "usar Y", "NO usar Z", "lenguaje: N"
     - Listas de "requisitos tecnicos no negociables"
     - Si encontras declaracion explicita Y CONTRADICE el architecture_repo,
       gana el prompt (el usuario sabe lo que hace en este run). source=
       "user_declared", ambiguous=false, y anota el conflicto en
       justification.

  3. target_repo + codebase_references / existing_docs: si el repo ya existe
     con un stack identificable (package.json, requirements.txt, build.gradle,
     Package.swift, pyproject.toml), respetalo. source="repo_inferred",
     ambiguous=false.

  4. Memoria / defaults: si el dominio es mobile (prompt menciona
     Android/iOS/app) y no hay architecture_repo, propone los defaults
     mas comunes del ecosistema (Android=Kotlin, iOS=Swift).
     source="memory_default", ambiguous=false.

  5. Ambiguedad genuina: ej. "necesitamos un servicio backend" sin mas
     contexto, y no hay repo previo ni architecture_repo. En ese caso
     source="inferred_ambiguous", ambiguous=true, y propones el stack mas
     razonable con justificacion. El gate downstream detectara
     ambiguous=true y pedira HITL.

  Si el usuario agrego un repo con categoria "design_system" en
  reference_repos, inclui su nombre en libs_required. Ejemplo:
  libs_required: ["machbank-design-system"]. Esto hace que el coding agent
  no pueda violar el DS: cualquier componente UI debe consumirlo.

  Formato de salida — tu final_answer DEBE ser un JSON con UNA sola key
  top-level llamada "stack_contract", cuyo valor es el objeto anidado.
  NO devuelvas las keys planas (language, framework, ...) al top level:
  el runtime valida required_outputs=["stack_contract"] y falla si no esta
  esa key exacta.

  Ejemplo correcto:
    {
      "stack_contract": {
        "language": "typescript",
        "framework": "fastify",
        "runtime": "node20",
        "libs_required": ["vitest", "tsx"],
        "libs_forbidden": ["express", "flask"],
        "source": "user_declared",
        "ambiguous": false,
        "justification": "1-2 frases de por que elegiste este stack"
      }
    }

  Valores admitidos:
    language:  "typescript" | "python" | "kotlin" | "swift" | ...
    framework: "fastify" | "fastapi" | "android sdk" | "swiftui" | ...
    runtime:   "node20" | "cpython3.11" | "jvm17" | null
    source:    "user_declared" | "repo_inferred" | "memory_default" | "inferred_ambiguous"
    ambiguous: true | false
    libs_required / libs_forbidden: arrays opcionales, pueden ser []

  Reglas duras:
  - Si el prompt dice "NO usar Python" y vos devolves language=python, estas
    fallando. Leelo linea por linea.
  - Si el prompt dice "stack obligatorio: Node.js + Fastify + TypeScript",
    language=typescript, framework=fastify, runtime=node20, source=user_declared.
  - Nunca inventes una version especifica si el usuario/repo no la declaro.
  - Si hay 2+ fuentes en conflicto (ej. prompt dice TS pero repo dice Python),
    GANA el prompt. Dejalo escrito en justification.

# -----------------------------------------------------------------------------
# Failure modes documentados
# -----------------------------------------------------------------------------
failure_modes:
  - mode: "prompt y repo en conflicto"
    handling: "ganar prompt; escribir conflicto en justification"
  - mode: "dominio no detectable (ni mobile ni backend ni frontend claro)"
    handling: "source=inferred_ambiguous, ambiguous=true, stack mas razonable con justification"
