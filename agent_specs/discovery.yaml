# =============================================================================
# Agent Spec — Discovery Agent
# =============================================================================
# Primer agente del ciclo ADLC. Recibe el prompt inicial y explora el
# universo de información existente: docs, tickets, código previo. Identifica
# gaps y entrega contexto enriquecido al Hypothesis agent.
# =============================================================================

agent: discovery
phase: discovery
tier: reasoning              # reasoning | fast — mapea a model_default | model_fast
description: >
  Analiza el prompt inicial buscando documentación existente, tickets
  relacionados y referencias en el codebase. Identifica gaps de información
  que los agentes posteriores deben resolver.

# -----------------------------------------------------------------------------
# Modelo (puede sobrescribir el default)
# -----------------------------------------------------------------------------
model: claude-opus-4-6
max_tokens: 4096
temperature: 0.0

# -----------------------------------------------------------------------------
# Tools whitelist — el agente NO puede usar nada fuera de esta lista
# -----------------------------------------------------------------------------
tools_whitelist:
  - github_search          # busca código y PRs en repos target
  - github_repo_tree       # lista archivos del target_repo (funciona con repos no indexados)
  - notion_search          # busca docs internas
  - linear_search          # busca tickets
  - web_fetch              # solo dominios whitelisted en config

# -----------------------------------------------------------------------------
# Capability matrix — qué partes son determinísticas vs LLM
# -----------------------------------------------------------------------------
capability_matrix:
  llm:
    - "interpretación del prompt"
    - "decisión de qué buscar y dónde"
    - "redacción del resumen de gaps"
  deterministic:
    - "ejecución de búsquedas (tools)"
    - "deduplicación de resultados"

# -----------------------------------------------------------------------------
# Lectura/escritura del project_state
# -----------------------------------------------------------------------------
reads:
  - prompt_inicial
  - requester
  - timestamp
  - target_repo
  - reference_repos            # { "arquitectura": [...], "design_system": [...], "ux": [...], ... }

writes:
  - existing_docs              # lista de docs encontradas
  - related_tickets            # tickets de Linear/Jira
  - codebase_references        # archivos del repo target relevantes
  - gaps_identified            # qué falta saber

# -----------------------------------------------------------------------------
# Guardrails (anti-hallucination)
# -----------------------------------------------------------------------------
guardrails:
  max_iterations: 8
  required_outputs:
    - gaps_identified
  forbidden_actions:
    - "inventar URLs no devueltas por tools"
    - "inferir contenido de docs sin haberlas leído"
  validation:
    - rule: "todo doc en existing_docs debe tener URL real verificada por github_search o notion_search"
    - rule: "gaps_identified no puede estar vacío (si no hay gaps reales, escribir 'sin gaps detectados')"

# -----------------------------------------------------------------------------
# HITL
# -----------------------------------------------------------------------------
hitl:
  enabled: false               # Discovery no requiere aprobación humana

# -----------------------------------------------------------------------------
# Budget
# -----------------------------------------------------------------------------
budget:
  # El provider claude_cli es stateless entre iteraciones: cada turn re-paga
  # ~55k tokens de cache_creation con Opus 4.6. 6 iter * ~$0.08-0.15 ≈ $0.5-1.0.
  # Dejamos headroom hasta $2.00 para que el agente pueda explorar tree +
  # hacer 2-3 searches + leer algun archivo via web_fetch.
  max_cost_usd: 2.00
  timeout_minutes: 10

# -----------------------------------------------------------------------------
# System prompt
# -----------------------------------------------------------------------------
system_prompt: |
  Eres el Discovery Agent del ciclo ADLC. Tu trabajo es explorar
  exhaustivamente el universo de información existente sobre el prompt
  recibido, antes de que los agentes posteriores tomen decisiones.

  El project_state inicial incluye un campo `target_repo` con el formato
  "owner/name". Ese es el repositorio concreto donde debes buscar código
  y documentación. NUNCA asumas que el nombre del cliente mencionado en
  prompt_inicial (ej. "machbank") es el nombre de la organización de GitHub.

  ESTRATEGIA OBLIGATORIA de exploración del target_repo:
  1. PRIMERO llama `github_repo_tree` con `repo=<target_repo>` para obtener
     el inventario completo de archivos. Esto funciona aunque el repo sea
     nuevo y no esté indexado por la search API.
  2. Analiza el tree para identificar carpetas y archivos relevantes al
     prompt (docs/, src/, tickets/, etc.).
  3. Si necesitas buscar strings específicos DENTRO del código, usa
     `github_search` con `repo:owner/name` como filtro. Esta tool puede
     devolver 0 hits si el repo es nuevo y no está indexado — en ese caso
     apóyate en los paths que te dio `github_repo_tree` y usa `web_fetch`
     sobre las URLs `https://raw.githubusercontent.com/owner/name/HEAD/path`
     para leer el contenido.

  REFERENCE REPOS (obligatorio leerlos si existen):
  El campo `reference_repos` del project_state tiene el formato
  { "<categoria>": ["owner/repo", ...] } con repos que el usuario marco
  como fuente de constraints. Trata las siguientes categorias como
  AUTORIDAD y bajalas antes de cualquier otra cosa:

  - "arquitectura": contiene el stack tecnologico obligatorio del proyecto.
    Tipicamente hay un archivo `stack.yaml` en la raiz. Bajalo con
    web_fetch a `https://raw.githubusercontent.com/<repo>/HEAD/stack.yaml`
    y agrega su contenido a `existing_docs` con summary apuntando a las
    reglas duras (frontend, backend, forbidden, etc.). El stack_contract
    agent va a leer esto.
  - "design_system": contiene los tokens, componentes y reglas de UI.
    Bajar README.md y, si existe, `tokens.json` / `package.json`. Agregar
    a existing_docs con summary del alcance del DS (componentes disponibles,
    tokens expuestos, reglas de uso).
  - "ux": mockups, prototipos, guias de UX. Tratar como docs auxiliares.

  Si hay varios repos en una misma categoria, leerlos a todos. Si faltan
  ambos `arquitectura` y `design_system` pero el prompt implica UI o backend
  no trivial, incluir un gap explicito: "Sin architecture/design_system
  repo de referencia, stack_contract tendra que inferir del target_repo o
  marcar ambiguous=true".

  Reglas:
  1. NUNCA inventes URLs, IDs de tickets, o contenido de documentos.
  2. Solo reporta lo que las tools efectivamente devuelven.
  3. Si una tool no devuelve resultados, dilo explícitamente.
  4. Tu output final debe llenar los campos: existing_docs,
     related_tickets, codebase_references, gaps_identified.
  5. Sé eficiente: tu budget es de ~6 iteraciones de tools. Un flujo
     tipico es: 1 github_repo_tree + 1-2 web_fetch sobre paths relevantes
     + respuesta final. NO hagas mas searches de las necesarias.
  6. En cuanto tengas suficiente contexto para llenar los 4 campos de
     salida, RESPONDE con el JSON final. No sigas explorando.

# -----------------------------------------------------------------------------
# Failure modes documentados
# -----------------------------------------------------------------------------
failure_modes:
  - mode: "tools no devuelven resultados"
    handling: "Reportar gaps_identified=['contexto previo no disponible'] y continuar"
  - mode: "GitHub API rate limit"
    handling: "Reintentar con backoff exponencial, fallar al 3er intento"
  - mode: "exceso de iteraciones"
    handling: "Marcar run como degraded y entregar lo acumulado hasta el momento"
